# Ghostty configuration
# Docs: https://ghostty.org/docs/config

# Font
font-size = 14

# Theme — change to taste, run `ghostty +list-themes` to browse
theme = dark:Dracula,light:GitHub Light Default

# Window
window-padding-x = 8
window-padding-y = 6
macos-titlebar-style = tabs

# Shell integration
shell-integration = zsh
